name: RAGAS Evaluation

on:
  workflow_dispatch:          # run manually from the GitHub Actions UI
  schedule:
    - cron: "0 6 * * 1"      # every Monday at 06:00 UTC

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "ragas>=0.2.0,<0.3.0" datasets nest_asyncio

      - name: Build FAISS index from docs/
        run: python tests/eval/build_index.py

      - name: Run RAGAS evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python tests/eval/run_eval.py
