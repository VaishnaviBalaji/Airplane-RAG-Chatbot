services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Mount the pre-built FAISS index from the host — not baked into the image
      - ./index:/app/index:ro
    restart: unless-stopped

  chat:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./index:/app/index:ro
    command: chainlit run chat.py --host 0.0.0.0 --port 8080
    restart: unless-stopped
